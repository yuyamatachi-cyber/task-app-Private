<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkBPO タスク管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e8e8e4;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.db-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.db-dot.ok{background:#639922}.db-dot.err{background:#E24B4A}.db-dot.loading{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.title-input{font-size:15px;font-weight:500;border:none;border-bottom:1px dashed transparent;outline:none;background:transparent;color:#1a1a1a;width:220px;cursor:text}
.title-input:hover{border-bottom-color:#ccc}
.title-input:focus{border-bottom-color:#999;cursor:text}
.main{max-width:960px;margin:0 auto;padding:24px 16px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:12px 16px}
.stat-n{font-size:24px;font-weight:500}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.tab-bar{display:flex;border-bottom:1px solid #e8e8e4;margin-bottom:16px}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:500;border-radius:8px;background:#1a1a1a;color:#fff;border:none;cursor:pointer}
.add-btn:hover{background:#333}
.add-btn:disabled{opacity:.4;cursor:not-allowed}
.filter-sel{font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid #e0e0dc;background:#fff;color:#1a1a1a;cursor:pointer}
.icon-btn-sm{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #e0e0dc;background:#fff;color:#888;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.icon-btn-sm:hover{color:#1a1a1a}
.kb-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kb-col{background:#f0f0ec;border-radius:10px;padding:10px;min-height:80px}
.kb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kb-label{font-size:12px;font-weight:500;color:#666}
.kb-count{font-size:11px;background:#fff;border:1px solid #e0e0dc;border-radius:99px;padding:1px 8px;color:#666}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:8px;padding:10px;margin-bottom:8px}
.card:hover{border-color:#ccc}
.card-title{font-size:13px;margin-bottom:6px;line-height:1.4}
.card-due{font-size:11px;color:#888;margin-bottom:6px}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.card:hover .card-actions{opacity:1}
.icon-btn{background:transparent;border:none;cursor:pointer;color:#888;padding:3px 5px;border-radius:4px;font-size:14px;line-height:1}
.icon-btn:hover{color:#1a1a1a;background:#f0f0ec}
.icon-btn.danger:hover{color:#E24B4A}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;background:#e8e8e4;color:#444}
.av{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;background:#e8e8e4;color:#444;flex-shrink:0}
.list-table{width:100%;border-collapse:collapse;table-layout:fixed;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e8e8e4}
.list-table th{font-size:11px;color:#888;font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid #e8e8e4;background:#f8f8f6}
.list-table td{font-size:13px;padding:9px 12px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr:hover td{background:#fafaf8}
.row-actions{display:flex;gap:4px;opacity:0}
tr:hover .row-actions{opacity:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding-top:60px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e8e8e4;width:100%;max-width:440px;padding:22px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:500}
.close-btn{background:transparent;border:none;cursor:pointer;color:#888;font-size:20px;line-height:1}
.form-row{margin-bottom:13px}
.form-label{font-size:12px;color:#666;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 11px;font-size:13px;border:1px solid #e0e0dc;border-radius:8px;background:#fff;color:#1a1a1a}
.form-input:focus{outline:none;border-color:#999}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.form-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.gear-btn{background:transparent;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:0;line-height:1}
.gear-btn:hover{color:#888}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid #e8e8e4}
.btn-cancel{padding:8px 18px;font-size:13px;border-radius:8px;background:transparent;border:1px solid #e0e0dc;color:#888;cursor:pointer}
.btn-cancel:hover{background:#f8f8f6}
.btn-save{padding:8px 18px;font-size:13px;font-weight:500;border-radius:8px;background:#1a1a1a;color:#fff;border:none;cursor:pointer}
.btn-save:hover{background:#333}
.btn-save:disabled{opacity:.4}
.del-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;align-items:center;justify-content:center}
.del-overlay.open{display:flex}
.del-box{background:#fff;border-radius:12px;padding:24px;max-width:320px;text-align:center;border:1px solid #e8e8e4}
.del-box p{font-size:13px;color:#666;margin-bottom:18px;line-height:1.6}
.btn-delete{padding:8px 18px;font-size:13px;font-weight:500;border-radius:8px;background:#E24B4A;color:#fff;border:none;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:99px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:300;background:#1a1a1a;color:#fff}
.toast.err{background:#E24B4A}
.toast.show{opacity:1}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding-top:60px}
.settings-overlay.open{display:flex}
.settings-modal{background:#fff;border-radius:12px;border:1px solid #e8e8e4;width:100%;max-width:480px;padding:22px;max-height:80vh;overflow-y:auto}
.sec-title{font-size:13px;font-weight:500;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0f0ec}
.opt-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.opt-row{display:flex;align-items:center;gap:6px}
.opt-row span{flex:1;font-size:13px;padding:5px 8px;background:#f8f8f6;border-radius:6px;border:1px solid #e8e8e4}
.opt-del{background:transparent;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 6px;border-radius:4px}
.opt-del:hover{color:#E24B4A;background:#fef2f2}
.opt-add-row{display:flex;gap:6px;margin-bottom:20px}
.opt-add-row input{flex:1;padding:7px 10px;font-size:13px;border:1px solid #e0e0dc;border-radius:8px;background:#fff;color:#1a1a1a}
.opt-add-row input:focus{outline:none;border-color:#999}
.opt-add-btn{padding:7px 14px;font-size:13px;border-radius:8px;background:#1a1a1a;color:#fff;border:none;cursor:pointer}
.loading-state{padding:32px;text-align:center;color:#888;font-size:13px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #e0e0dc;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.settings-icon-btn{background:transparent;border:none;cursor:pointer;color:#888;font-size:20px;padding:4px;line-height:1;border-radius:6px}
.settings-icon-btn:hover{color:#1a1a1a;background:#f0f0ec}
@media(max-width:640px){
  .kb-cols{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-2{grid-template-columns:1fr}
  .header{padding:0 12px}
  .title-input{width:140px;font-size:14px}
  .main{padding:12px 10px}
  .share-label{display:none}
  .toolbar{flex-wrap:wrap;gap:8px}
  .tag{font-size:10px;padding:2px 6px;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;display:inline-block}
  .card-meta{flex-wrap:nowrap;gap:4px}
  .stat-n{font-size:20px}
  .stat-l{font-size:10px}
  .stat-card{padding:10px 12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="db-dot loading" id="db-dot"></span>
    <input class="title-input" id="app-title" type="text" value="LinkBPO タスク管理" 
      onchange="saveTitle(this.value)"
      onkeydown="if(event.key==='Enter'){saveTitle(this.value);this.blur()}">
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="icon-btn-sm" onclick="exportShareUrl()"><i class="ti ti-link"></i><span class="share-label"> 共有リンク</span></button>
    <button class="settings-icon-btn" onclick="openSettings()" title="選択肢を管理"><i class="ti ti-settings"></i></button>
  </div>
</div>

<div class="main">
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-n" id="s-total">—</div><div class="stat-l">合計タスク</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchView('kanban',this)"><i class="ti ti-layout-kanban"></i> カンバン</button>
    <button class="tab" onclick="switchView('list',this)"><i class="ti ti-list"></i> リスト</button>
    <button class="tab" onclick="switchView('archive',this)"><i class="ti ti-archive"></i> アーカイブ</button>
  </div>
  <div class="toolbar">
    <div style="display:flex;gap:8px;align-items:center">
      <button class="add-btn" id="add-btn" onclick="openModal()" disabled><i class="ti ti-plus" style="font-size:14px"></i> タスクを追加</button>
      <select class="filter-sel" id="filter-bpo" onchange="render()"><option value="">すべての区分</option></select>
      <button class="icon-btn-sm" onclick="loadAll()"><i class="ti ti-refresh"></i></button>
    </div>
    <span id="task-count" style="font-size:12px;color:#888"></span>
  </div>
  <div id="view-kanban"><div class="loading-state"><span class="spinner"></span>読み込み中...</div></div>
  <div id="view-list" style="display:none"></div>
  <div id="view-archive" style="display:none"></div>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">タスクを追加</span>
      <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-row">
      <label class="form-label">タスク名 <span style="color:#E24B4A">*</span></label>
      <input class="form-input" id="f-title" type="text" placeholder="タスク名を入力">
    </div>
    <div class="form-2">
      <div>
        <div class="form-label-row"><label class="form-label" style="margin:0">区分</label><button class="gear-btn" onclick="openInlineOpts('bpo')"><i class="ti ti-settings"></i></button></div>
        <input class="form-input" id="f-bpo" type="text" list="dl-bpo" placeholder="選択または入力" autocomplete="off">
        <datalist id="dl-bpo"></datalist>
      </div>
      <div>
        <div class="form-label-row"><label class="form-label" style="margin:0">ステータス</label><button class="gear-btn" onclick="openInlineOpts('status')"><i class="ti ti-settings"></i></button></div>
        <input class="form-input" id="f-status" type="text" list="dl-status" placeholder="選択または入力" autocomplete="off">
        <datalist id="dl-status"></datalist>
      </div>
    </div>
    <div class="form-2">
      <div>
        <div class="form-label-row"><label class="form-label" style="margin:0">担当者</label><button class="gear-btn" onclick="openInlineOpts('assignee')"><i class="ti ti-settings"></i></button></div>
        <input class="form-input" id="f-assignee" type="text" list="dl-assignee" placeholder="選択または入力" autocomplete="off">
        <datalist id="dl-assignee"></datalist>
      </div>
      <div><label class="form-label">期日</label><input class="form-input" id="f-due" type="date"></div>
    </div>
    <div class="form-row">
      <label class="form-label">メモ</label>
      <textarea class="form-input" id="f-note" rows="2" style="resize:vertical"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="btn-save" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<!-- DELETE -->
<div class="del-overlay" id="del-overlay">
  <div class="del-box">
    <p>「<strong id="del-name"></strong>」を削除しますか？</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-cancel" onclick="closeDel()">キャンセル</button>
      <button class="btn-delete" id="btn-del-ok" onclick="confirmDel()">削除する</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-modal">
    <div class="modal-header" style="margin-bottom:16px">
      <span class="modal-title">選択肢の管理</span>
      <button class="close-btn" onclick="closeSettings()"><i class="ti ti-x"></i></button>
    </div>
    <div class="sec-title">区分</div>
    <div class="opt-list" id="ol-bpo"></div>
    <div class="opt-add-row"><input type="text" id="inp-bpo" placeholder="新しい区分を入力"><button class="opt-add-btn" onclick="addOpt('bpo')">追加</button></div>
    <div class="sec-title">ステータス</div>
    <div class="opt-list" id="ol-status"></div>
    <div class="opt-add-row"><input type="text" id="inp-status" placeholder="新しいステータスを入力"><button class="opt-add-btn" onclick="addOpt('status')">追加</button></div>
    <div class="sec-title">担当者</div>
    <div class="opt-list" id="ol-assignee"></div>
    <div class="opt-add-row"><input type="text" id="inp-assignee" placeholder="新しい担当者を入力"><button class="opt-add-btn" onclick="addOpt('assignee')">追加</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://hcggwurjpxzqtchyqdsz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZ2d3dXJqcHh6cXRjaHlxZHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTM5MzIsImV4cCI6MjA5NDkyOTkzMn0._QP4L1vqAu75lTki61Ah7cRRL1iM78lxS3alEAtvOrQ';
const HEADERS = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const DEFAULTS = {
  bpo:['建築BPO','土木BPO','LinkBPO'],
  status:['未着手','進行中','レビュー待ち','完了'],
  assignee:['田中 一郎','鈴木 花子','中村 誠','伊藤 さき','山田 健太','小林 めぐみ'],
};
const SEED_TASKS = [
  {title:'基本設計書の作成',bpo:'建築BPO',status:'未着手',assignee:'田中 一郎',due:'2026-06-10',note:''},
  {title:'施工図レビュー依頼',bpo:'土木BPO',status:'未着手',assignee:'鈴木 花子',due:'2026-06-05',note:''},
  {title:'業務フロー整備',bpo:'LinkBPO',status:'未着手',assignee:'中村 誠',due:'2026-06-15',note:''},
  {title:'竣工図デジタル化',bpo:'建築BPO',status:'進行中',assignee:'田中 一郎',due:'2026-05-28',note:''},
  {title:'CADデータ整理',bpo:'土木BPO',status:'進行中',assignee:'伊藤 さき',due:'2026-05-30',note:''},
  {title:'ナーミング規則策定',bpo:'LinkBPO',status:'進行中',assignee:'中村 誠',due:'2026-06-01',note:''},
  {title:'積算チェック対応',bpo:'土木BPO',status:'進行中',assignee:'鈴木 花子',due:'2026-05-25',note:''},
  {title:'組織図ドラフト',bpo:'LinkBPO',status:'レビュー待ち',assignee:'中村 誠',due:'2026-05-22',note:''},
  {title:'断面図修正版',bpo:'建築BPO',status:'レビュー待ち',assignee:'伊藤 さき',due:'2026-05-23',note:''},
  {title:'ヒアリングシート作成',bpo:'建築BPO',status:'完了',assignee:'鈴木 花子',due:'2026-05-15',note:''},
  {title:'クライアント報告資料',bpo:'建築BPO',status:'完了',assignee:'田中 一郎',due:'2026-05-18',note:''},
  {title:'マニュアル初版',bpo:'LinkBPO',status:'完了',assignee:'中村 誠',due:'2026-05-20',note:''},
];

let tasks=[], opts={...DEFAULTS}, editId=null, delId=null, view='kanban';

async function supa(path, method='GET', body=null){
  const res = await fetch(SUPA_URL+path, {
    method, headers:{...HEADERS, ...(method==='GET'?{'Prefer':'return=representation'}:{'Prefer':'return=representation'})},
    ...(body?{body:JSON.stringify(body)}:{})
  });
  if(!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadAll(){
  try{
    const [rows, settingsRows] = await Promise.all([
      supa('/rest/v1/tasks?archived=eq.false&order=id'),
      supa('/rest/v1/settings?select=key,value'),
    ]);
    tasks = rows || [];

    // Seed tasks if empty
    if(tasks.length === 0){
      for(const t of SEED_TASKS){
        const r = await supa('/rest/v1/tasks', 'POST', t);
        if(r && r[0]) tasks.push(r[0]);
      }
    }

    // Load opts from DB
    opts = {bpo:[...DEFAULTS.bpo], status:[...DEFAULTS.status], assignee:[...DEFAULTS.assignee]};
    (settingsRows||[]).forEach(r=>{
      if(r.key === 'title') return;
      const val = Array.isArray(r.value) ? r.value : (typeof r.value === 'string' ? JSON.parse(r.value) : r.value);
      if(Array.isArray(val)) opts[r.key] = val;
    });

    // Load title
    const titleRow = (settingsRows||[]).find(r=>r.key==='title');
    if(titleRow) {
      document.getElementById('app-title').value = titleRow.value;
      document.title = titleRow.value;
    }

    document.getElementById('db-dot').className='db-dot ok';
    document.getElementById('add-btn').disabled=false;
    if(window.innerWidth < 640 && view==='kanban'){
      view='list';
      document.getElementById('view-kanban').style.display='none';
      document.getElementById('view-list').style.display='block';
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab')[1].classList.add('active');
    }
    render();
  } catch(e){
    document.getElementById('db-dot').className='db-dot err';
    document.getElementById('view-kanban').innerHTML='<div class="loading-state" style="color:#E24B4A">DB接続エラー</div>';
  }
}

async function saveTitle(val){
  val = val.trim() || 'LinkBPO タスク管理';
  document.getElementById('app-title').value = val;
  document.title = val;
  try{
    await supa('/rest/v1/settings', 'POST', {key:'title', value:val});
  } catch(e){
    // upsert
    await supa('/rest/v1/settings?key=eq.title', 'PATCH', {value:val});
  }
}

const COLORS=[
  {bg:'#E6F1FB',cl:'#0C447C'},{bg:'#FAEEDA',cl:'#633806'},{bg:'#EEEDFE',cl:'#3C3489'},
  {bg:'#EAF3DE',cl:'#27500A'},{bg:'#FCEBEB',cl:'#791F1F'},{bg:'#E1F5EE',cl:'#085041'},
  {bg:'#FBEAF0',cl:'#72243E'},{bg:'#F1EFE8',cl:'#444441'},
];
function colorFor(val,type){const i=opts[type]?opts[type].indexOf(val):-1;return i>=0?COLORS[i%COLORS.length]:{bg:'#e8e8e4',cl:'#444'};}
function tagHtml(val,type){const c=colorFor(val,type);return`<span class="tag" style="background:${c.bg};color:${c.cl}">${esc(val)}</span>`;}
function avHtml(name){const c=colorFor(name,'assignee');return`<span class="av" style="background:${c.bg};color:${c.cl}">${esc((name||'?').charAt(0))}</span>`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateStats(){
  const by={};tasks.forEach(t=>{by[t.status]=(by[t.status]||0)+1;});
  document.getElementById('s-total').textContent=tasks.length;
  const grid=document.getElementById('stats-grid');
  // 合計カード以外を再生成
  [...grid.querySelectorAll('.stat-card-dynamic')].forEach(el=>el.remove());
  const colors=['#185FA5','#BA7517','#639922','#8B5CF6','#E24B4A','#0891B2','#D97706'];
  const allStatus=[...(opts.status||[]),...Object.keys(by).filter(s=>s&&!(opts.status||[]).includes(s))];
  allStatus.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='stat-card stat-card-dynamic';
    card.innerHTML=`<div class="stat-n" style="color:${colors[i%colors.length]}">${by[s]||0}</div><div class="stat-l">${esc(s)}</div>`;
    grid.appendChild(card);
  });
  grid.style.gridTemplateColumns=`repeat(${1+allStatus.length},1fr)`;
}

function populateFilter(){
  const sel=document.getElementById('filter-bpo');
  const cur=sel.value;
  const knownBpo=opts.bpo||[];
  const extraBpo=[...new Set(tasks.map(t=>t.bpo).filter(b=>b&&!knownBpo.includes(b)))];
  const allBpo=[...knownBpo,...extraBpo];
  sel.innerHTML='<option value="">すべての区分</option>'+allBpo.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('');
  if(cur)sel.value=cur;
}

function ft(){const b=document.getElementById('filter-bpo').value;return b?tasks.filter(t=>t.bpo===b):tasks;}

function render(){
  updateStats();populateFilter();
  const f=ft();
  document.getElementById('task-count').textContent=f.length+' 件';
  if(view==='kanban')renderKanban(f);else renderList(f);
}

function renderKanban(f){
  const knownStatus=opts.status||[];
  const extraStatus=[...new Set(f.map(t=>t.status).filter(s=>s&&!knownStatus.includes(s)))];
  const allStatus=[...knownStatus,...extraStatus];
  const cols=allStatus.map(s=>{
    const ct=f.filter(t=>t.status===s);
    if(ct.length===0) return '';
    return`<div class="kb-col">
      <div class="kb-head"><span class="kb-label">${esc(s)}</span><span class="kb-count">${ct.length}</span></div>
      ${ct.map(t=>`<div class="card">
        <div class="card-title">${esc(t.title)}</div>
        ${t.due?`<div class="card-due"><i class="ti ti-calendar" style="font-size:11px"></i> ${t.due}</div>`:''}
        <div class="card-meta">${tagHtml(t.bpo,'bpo')}
          <div style="display:flex;align-items:center;gap:6px">${avHtml(t.assignee)}
            <div class="card-actions">
              <button class="icon-btn" title="完了・アーカイブ" onclick="archiveTask(${t.id})"><i class="ti ti-check"></i></button>
              <button class="icon-btn" onclick="openModal(${t.id})"><i class="ti ti-edit"></i></button>
              <button class="icon-btn danger" onclick="openDel(${t.id})"><i class="ti ti-trash"></i></button>
            </div>
          </div>
        </div></div>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('view-kanban').innerHTML=`<div class="kb-cols" style="grid-template-columns:repeat(${allStatus.length},minmax(180px,1fr))">${cols}</div>`;
}

function renderList(f){
  const rows=f.map(t=>`<tr>
    <td style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</td>
    <td>${tagHtml(t.bpo,'bpo')}</td><td>${tagHtml(t.status,'status')}</td>
    <td style="white-space:nowrap">${avHtml(t.assignee)} <span style="font-size:12px;margin-left:4px">${esc(t.assignee)}</span></td>
    <td style="color:#888;font-size:12px">${t.due||'—'}</td>
    <td><div class="row-actions">
      <button class="icon-btn" title="完了・アーカイブ" onclick="archiveTask(${t.id})"><i class="ti ti-check"></i></button>
      <button class="icon-btn" onclick="openModal(${t.id})"><i class="ti ti-edit"></i></button>
      <button class="icon-btn danger" onclick="openDel(${t.id})"><i class="ti ti-trash"></i></button>
    </div></td></tr>`).join('');
  document.getElementById('view-list').innerHTML=`<table class="list-table">
    <colgroup><col style="width:32%"><col style="width:13%"><col style="width:15%"><col style="width:20%"><col style="width:12%"><col style="width:8%"></colgroup>
    <thead><tr><th>タスク名</th><th>区分</th><th>ステータス</th><th>担当者</th><th>期日</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function switchView(id,btn){
  view=id;
  document.getElementById('view-kanban').style.display=id==='kanban'?'block':'none';
  document.getElementById('view-list').style.display=id==='list'?'block':'none';
  document.getElementById('view-archive').style.display=id==='archive'?'block':'none';
  document.getElementById('add-btn').style.display=id==='archive'?'none':'inline-flex';
  document.getElementById('filter-bpo').style.display=id==='archive'?'none':'block';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(id==='archive') renderArchive(); else render();
}

function openModal(id){
  editId=id||null;
  document.getElementById('modal-title').textContent=id?'タスクを編集':'タスクを追加';
  ['bpo','status','assignee'].forEach(type=>{
    const dl=document.getElementById('dl-'+type);
    dl.innerHTML=(opts[type]||[]).map(o=>`<option value="${esc(o)}">`).join('');
    if(!id) document.getElementById('f-'+type).value='';
  });
  if(id){
    const t=tasks.find(x=>x.id===id);
    document.getElementById('f-title').value=t.title;
    document.getElementById('f-bpo').value=t.bpo||'';
    document.getElementById('f-status').value=t.status||'';
    document.getElementById('f-assignee').value=t.assignee||'';
    document.getElementById('f-due').value=t.due||'';
    document.getElementById('f-note').value=t.note||'';
  } else {
    document.getElementById('f-title').value='';
    document.getElementById('f-due').value='';
    document.getElementById('f-note').value='';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

async function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').style.borderColor='#E24B4A';return;}
  document.getElementById('f-title').style.borderColor='';
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='保存中...';
  const due=document.getElementById('f-due').value;
  const data={title,bpo:document.getElementById('f-bpo').value||null,status:document.getElementById('f-status').value||null,assignee:document.getElementById('f-assignee').value||null,due:due||null,note:document.getElementById('f-note').value};
  // 新しい値を選択肢に自動追加
  const autoAddTypes=['bpo','status','assignee'];
  const optsUpdated=[];
  for(const type of autoAddTypes){
    const val=data[type];
    if(val&&!(opts[type]||[]).includes(val)){
      opts[type]=[...(opts[type]||[]),val];
      optsUpdated.push(type);
    }
  }
  try{
    if(optsUpdated.length>0){
      await Promise.all(optsUpdated.map(type=>saveOpts(type)));
    }
    if(editId){
      await supa('/rest/v1/tasks?id=eq.'+editId,'PATCH',data);
      const updated=await supa('/rest/v1/tasks?id=eq.'+editId);
      const i=tasks.findIndex(x=>x.id===editId);
      if(updated&&updated[0])tasks[i]=updated[0];
      toast('更新しました');
    } else {
      const r=await supa('/rest/v1/tasks','POST',data);
      if(r&&r[0])tasks.push(r[0]); else { const all=await supa('/rest/v1/tasks?archived=eq.false&order=id'); tasks=all||tasks; }
      toast('追加しました');
    }
    closeModal();render();
  }catch(e){console.error('saveTask error:',e);toast('保存に失敗しました: '+e.message,true);}
  finally{btn.disabled=false;btn.textContent='保存';}
}


async function archiveTask(id){
  try{
    await supa('/rest/v1/tasks?id=eq.'+id,'PATCH',{archived:true});
    tasks=tasks.filter(t=>t.id!==id);
    toast('アーカイブしました');render();
  }catch(e){toast('失敗しました',true);}
}

async function restoreTask(id){
  try{
    await supa('/rest/v1/tasks?id=eq.'+id,'PATCH',{archived:false});
    const restored=await supa('/rest/v1/tasks?id=eq.'+id);
    if(restored&&restored[0])tasks.push(restored[0]);
    toast('復元しました');renderArchive();
  }catch(e){toast('失敗しました',true);}
}

async function renderArchive(){
  const el=document.getElementById('view-archive');
  el.innerHTML='<div class="loading-state"><span class="spinner"></span>読み込み中...</div>';
  try{
    const archived=await supa('/rest/v1/tasks?archived=eq.true&order=id.desc');
    if(!archived||archived.length===0){el.innerHTML='<div style="text-align:center;padding:40px;color:#888;font-size:13px">アーカイブされたタスクはありません</div>';return;}
    const rows=archived.map(t=>`<tr>
      <td style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</td>
      <td>${t.bpo?tagHtml(t.bpo,'bpo'):''}</td><td>${t.status?tagHtml(t.status,'status'):''}</td>
      <td style="white-space:nowrap">${avHtml(t.assignee)} <span style="font-size:12px;margin-left:4px">${esc(t.assignee||'')}</span></td>
      <td style="color:#888;font-size:12px">${t.due||'—'}</td>
      <td><div class="row-actions">
        <button class="icon-btn" title="復元" onclick="restoreTask(${t.id})"><i class="ti ti-restore"></i></button>
        <button class="icon-btn danger" onclick="openDel(${t.id})"><i class="ti ti-trash"></i></button>
      </div></td></tr>`).join('');
    el.innerHTML=`<table class="list-table">
      <colgroup><col style="width:32%"><col style="width:13%"><col style="width:15%"><col style="width:20%"><col style="width:12%"><col style="width:8%"></colgroup>
      <thead><tr><th>タスク名</th><th>区分</th><th>ステータス</th><th>担当者</th><th>期日</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }catch(e){el.innerHTML='<div style="color:#E24B4A;padding:20px">読み込みに失敗しました</div>';}
}

function openDel(id){delId=id;document.getElementById('del-name').textContent=tasks.find(t=>t.id===id).title;document.getElementById('del-overlay').classList.add('open');}
function closeDel(){document.getElementById('del-overlay').classList.remove('open');}
async function confirmDel(){
  const btn=document.getElementById('btn-del-ok');
  btn.disabled=true;btn.textContent='削除中...';
  try{
    await supa('/rest/v1/tasks?id=eq.'+delId,'DELETE');
    tasks=tasks.filter(t=>t.id!==delId);
    closeDel();toast('削除しました');render();
  }catch(e){toast('削除に失敗しました',true);}
  finally{btn.disabled=false;btn.textContent='削除する';}
}

async function saveOpts(type){
  const res = await fetch(SUPA_URL+'/rest/v1/settings', {
    method:'POST',
    headers:{...HEADERS,'Prefer':'resolution=merge-duplicates,return=representation'},
    body:JSON.stringify({key:type, value:opts[type]})
  });
  return res.json();
}

function openSettings(){renderOptLists();document.getElementById('settings-overlay').classList.add('open');}
function openInlineOpts(type){
  renderOptLists();
  document.getElementById('settings-overlay').classList.add('open');
  setTimeout(()=>{const el=document.getElementById('inp-'+type);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.focus();}},100);
}
function closeSettings(){
  document.getElementById('settings-overlay').classList.remove('open');
  ['bpo','status','assignee'].forEach(type=>{
    const sel=document.getElementById('f-'+type);
    if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=(opts[type]||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('');
    if(cur&&(opts[type]||[]).includes(cur))sel.value=cur;
  });
  render();
}
function renderOptLists(){
  ['bpo','status','assignee'].forEach(type=>{
    document.getElementById('ol-'+type).innerHTML=(opts[type]||[]).map((o,i)=>
      `<div class="opt-row"><span>${esc(o)}</span><button class="opt-del" onclick="delOpt('${type}',${i})"><i class="ti ti-x" style="font-size:12px"></i></button></div>`
    ).join('');
  });
}
async function addOpt(type){
  const inp=document.getElementById('inp-'+type);
  const val=inp.value.trim();
  if(!val)return;
  if((opts[type]||[]).includes(val)){inp.style.borderColor='#E24B4A';return;}
  inp.style.borderColor='';
  opts[type]=[...(opts[type]||[]),val];
  await saveOpts(type);
  inp.value='';
  renderOptLists();
}
async function delOpt(type,idx){
  opts[type]=(opts[type]||[]).filter((_,i)=>i!==idx);
  await saveOpts(type);
  renderOptLists();
}

function exportShareUrl(){
  const url=location.origin+location.pathname;
  navigator.clipboard.writeText(url).then(()=>{
    toast('URLをコピーしました — このURLを共有するだけで最新データが見えます');
  }).catch(()=>prompt('共有URL:',url));
}

function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast'+(err?' err':'');
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);
}

document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.getElementById('settings-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('settings-overlay'))closeSettings();});
document.getElementById('del-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('del-overlay'))closeDel();});
['bpo','status','assignee'].forEach(t=>{document.getElementById('inp-'+t).addEventListener('keydown',e=>{if(e.key==='Enter')addOpt(t);});});

loadAll();
</script>
